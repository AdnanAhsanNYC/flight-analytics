version: 2

models:
  - name: mart_airline_performance
    description: "Airline performance metrics by year"
    columns:
      - name: airline
        tests:
          - not_null
      - name: flight_year
        tests:
          - not_null
      - name: on_time_rate_pct
        tests:
          - not_null

  - name: mart_monthly_trends
    description: "Monthly flight trends showing COVID impact"
    columns:
      - name: flight_year
        tests:
          - not_null
      - name: flight_month
        tests:
          - not_null
      - name: total_flights
        tests:
          - not_null

  - name: mart_delay_causes
    description: "Delay cause breakdown by month and year"
    columns:
      - name: primary_delay_cause
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Carrier', 'Weather', 'NAS', 'Late Aircraft', 'Security']

  - name: mart_airport_performance
    description: "Airport departure performance by year"
    columns:
      - name: origin_airport
        tests:
          - not_null
      - name: flight_year
        tests:
          - not_null